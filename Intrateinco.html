<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intranet Tecnoteinco </title>
  <style>
    body {
      font-family: 'Poppins', 'Helvetica Neue', sans-serif;
      background: radial-gradient(circle at top left, #667eea, #764ba2, #6b4b8c);
      color: #ffffff;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      color: #ffe484;
      font-size: 3em;
      font-weight: 700;
      background: rgba(0,0,0,0.2);
      padding: 20px 45px;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border: 2px solid rgba(255,228,132,0.3);
    }

    h2 {
      color: #ffe484;
      font-size: 2.2em;
      margin: 10px 0;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
      position: relative;
      display: inline-block;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 25%;
      width: 50%;
      height: 3px;
      background: #ffe484;
      border-radius: 2px;
    }

    p {
      font-size: 1.2em;
      line-height: 1.7;
      max-width: 650px;
      margin: 15px auto;
      background: rgba(255,255,255,0.15);
      padding: 12px 30px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    a {
      color: #ffe484;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }

    a:hover {
      color: #ffffff;
      border-bottom: 2px solid #ffe484;
    }

    p strong {
      color: #ffe484;
      font-size: 1.2em;
      background: rgba(0,0,0,0.2);
      padding: 2px 8px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <h1>¡Bienvenido a tecnoteinco!</h1>
  <p>Somos un Equipo de ingenieros asignados al proyecto INTRATEINCO</p>
  <h2>Brayam Estiven</h2>
  <h2>Cruz Arias</h2>
    <p><strong>Correos: 1070780173</strong>@teinco.edu.co</p>  
    <h2>Esta modificacion se realiza en la rama body</h2> 
</body>
</html>
